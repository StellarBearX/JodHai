version: '3.9'

services:
  # ─── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: jodhai_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: jodhai
      POSTGRES_PASSWORD: jodhai_secret
      POSTGRES_DB: jodhai
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U jodhai -d jodhai']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── pgAdmin (optional DB GUI) ─────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: jodhai_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@jodhai.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5050:80'
    depends_on:
      - postgres
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  pgadmin_data:
