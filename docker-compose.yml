services:
  # ─── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: jodhai_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: jodhai
      POSTGRES_PASSWORD: jodhai_secret
      POSTGRES_DB: jodhai
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U jodhai -d jodhai']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── API ───────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: jodhai_api
    restart: unless-stopped
    env_file:
      - apps/api/.env
    environment:
      DATABASE_URL: postgresql://jodhai:jodhai_secret@postgres:5432/jodhai
      NODE_ENV: production
      PORT: 3001
      LIFF_ORIGIN: http://localhost:5173
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy

  # ─── Frontend ──────────────────────────────────────────────────────────────
  liff:
    build:
      context: .
      dockerfile: apps/liff/Dockerfile
      args:
        VITE_API_URL: http://localhost:3001
    container_name: jodhai_liff
    restart: unless-stopped
    ports:
      - '5173:80'
    depends_on:
      - api

volumes:
  postgres_data:
